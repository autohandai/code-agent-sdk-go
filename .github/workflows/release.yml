name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-archive:
    name: Build source archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        env:
          RELEASE_INPUT: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_INPUT:-${RELEASE_TAG:-${GITHUB_REF_NAME}}}"
          version="${version#v}"

          if [[ -z "$version" ]]; then
            echo "Could not resolve a release version." >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version '$version' does not look like a semantic version." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test SDK
        run: go test ./...

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix=code-agent-sdk-go-${{ steps.release.outputs.version }}/ \
            -o dist/code-agent-sdk-go-${{ steps.release.outputs.version }}.tar.gz \
            HEAD
          shasum -a 256 dist/* > dist/SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist/*
